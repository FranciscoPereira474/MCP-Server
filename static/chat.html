<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 720px;
      max-width: 95vw;
      display: flex;
      flex-direction: column;
      height: 85vh;
    }

    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .chat-header span {
      font-size: 13px;
      font-weight: 400;
      color: #6b7280;
      margin-left: 8px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }

    .message.thinking {
      align-self: flex-start;
      background: #f3f4f6;
      color: #9ca3af;
      font-style: italic;
      border-bottom-left-radius: 4px;
    }

    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
    }

    .chat-input-area textarea {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area textarea:focus {
      border-color: #2563eb;
    }

    .chat-input-area button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      height: 44px;
    }

    .chat-input-area button:hover { background: #1d4ed8; }
    .chat-input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      Inventory Assistant
      <span>powered by LangChain + Ollama</span>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message assistant">
        Hello! I'm your inventory assistant. Ask me to list items, create suppliers, update stock, and more.
      </div>
    </div>
    <div class="chat-input-area">
      <textarea id="input" placeholder="Ask something... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
